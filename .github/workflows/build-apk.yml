name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install dependencies
      run: npm install

    - name: Build Web App
      run: npm run build

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Generate Release Keystore
      working-directory: ./android/app
      run: |
        keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"

    - name: Build Release APK
      working-directory: ./android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleRelease -Pandroid.injected.signing.storeFile=release.keystore -Pandroid.injected.signing.storePassword=password -Pandroid.injected.signing.keyAlias=release -Pandroid.injected.signing.keyPassword=password

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release.apk
